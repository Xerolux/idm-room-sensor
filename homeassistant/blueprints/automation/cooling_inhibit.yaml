blueprint:
  name: IDM cooling inhibit
  description: >
    Runs user-supplied inhibit actions when the dew-point margin falls below
    the unsafe threshold and clear actions after it rises above a separate
    recovery threshold. Keep the recovery threshold higher to provide
    hysteresis.

    Safety interlock: if the margin sensor becomes unavailable or unknown, the
    automation treats the state as unsafe and runs the inhibit actions. Pair
    this blueprint with the stale_guard blueprint so a stale-but-numeric margin
    is also caught.
  domain: automation
  input:
    margin_sensor:
      name: Dew-point margin sensor
      selector:
        entity:
          domain: sensor
    inhibit_below:
      name: Inhibit below
      description: Margin in kelvin below which cooling must be inhibited.
      default: 2
      selector:
        number:
          min: -5
          max: 20
          step: 0.1
          unit_of_measurement: K
          mode: box
    clear_above:
      name: Clear above
      description: >
        Margin in kelvin above which the inhibit may be cleared. Must be higher
        than the inhibit threshold; the automation asserts this at run time.
      default: 4
      selector:
        number:
          min: -5
          max: 20
          step: 0.1
          unit_of_measurement: K
          mode: box
    inhibit_actions:
      name: Inhibit actions
      description: Actions that place cooling in a safe inhibited state.
      default: []
      selector:
        action:
    clear_actions:
      name: Clear actions
      description: Actions that clear the inhibit after the recovery threshold.
      default: []
      selector:
        action:

variables:
  z_inhibit_below: !input inhibit_below
  z_clear_above: !input clear_above

triggers:
  - trigger: numeric_state
    id: inhibit
    entity_id: !input margin_sensor
    below: !input inhibit_below
  - trigger: numeric_state
    id: clear
    entity_id: !input margin_sensor
    above: !input clear_above
  # Fail-safe interlock: an unavailable or unknown margin sensor is treated as
  # unsafe and forces the inhibit path. Without this, a stuck sensor would
  # leave the previous inhibit/clear state in place indefinitely.
  - trigger: state
    id: unavailable
    entity_id: !input margin_sensor
    to: unavailable
  - trigger: state
    id: unavailable
    entity_id: !input margin_sensor
    to: unknown

actions:
  # Guard: enforce hysteresis ordering at run time. If the recovery threshold
  # is not above the inhibit threshold, stop immediately rather than letting
  # both numeric_state triggers flap against each other.
  - if:
      - condition: template
        value_template: "{{ z_clear_above <= z_inhibit_below }}"
    then:
      - stop: "Recovery threshold must be above the inhibit threshold"
  - choose:
      - conditions: "{{ trigger.id == 'inhibit' or trigger.id == 'unavailable' }}"
        sequence: !input inhibit_actions
    default: !input clear_actions

mode: restart
