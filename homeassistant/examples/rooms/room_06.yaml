template:
  - sensor:
      - name: "Room 06 Dew Point"
        unique_id: idm_room_06_dew_point
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        icon: mdi:water-thermometer
        availability: >
          {% set t = states('sensor.room_06_temperature') | float(none) %}
          {% set rh = states('sensor.room_06_humidity') | float(none) %}
          {{ t is not none and rh is not none and rh > 0 and rh <= 100 }}
        state: >
          {% set t = states('sensor.room_06_temperature') | float(none) %}
          {% set rh = states('sensor.room_06_humidity') | float(none) %}
          {% if t is not none and rh is not none and rh > 0 %}
            {% set a = 17.62 %}{% set b = 243.12 %}
            {% set g = log(rh / 100) + (a * t) / (b + t) %}
            {{ (b * g / (a - g)) | round(2) }}
          {% else %} unavailable {% endif %}
