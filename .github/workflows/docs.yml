name: Docs
on: [push, pull_request]
jobs:
  links-and-yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install repository check dependencies
        run: python -m pip install jinja2 jsonschema pytest pyyaml
      - uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .
          strict: false
          config_data: |
            extends: default
            rules:
              line-length: disable
      - name: Run repository checks
        run: make check
