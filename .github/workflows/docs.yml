name: Docs
on: [push, pull_request]

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  links-and-yaml:
    runs-on: ubuntu-latest
    steps:
      # Pinned to the commit SHA currently pointed at by actions/checkout@v4.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      # Pinned to the commit SHA currently pointed at by actions/setup-python@v5.
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: .github/requirements-ci.txt
      - name: Assert C++ compiler present
        # make check compiles the firmware core tests with g++ -std=c++17. The
        # ubuntu-latest image ships g++, but fail loudly if it ever does not,
        # rather than silently breaking on a runner image change.
        run: |
          command -v g++ >/dev/null 2>&1 || { echo "g++ is required for make check"; exit 1; }
          g++ --version
      - name: Install repository check dependencies
        run: python -m pip install -r .github/requirements-ci.txt
      # Pinned to the commit SHA currently pointed at by ibiqlik/action-yamllint@v3.
      - uses: ibiqlik/action-yamllint@2576378a8e339169678f9939646ee3ee325e845c  # v3
        with:
          file_or_dir: .
          strict: false
          config_data: |
            extends: default
            rules:
              line-length: disable
      - name: Run repository checks
        run: make check
