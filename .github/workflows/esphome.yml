name: ESPHome

on:
  push:
    paths:
      - ".github/workflows/esphome.yml"
      - "firmware/**"
      - "hardware/*/firmware/**"
      - "homeassistant/**"
      - "tools/check_esphome.py"
  pull_request:
    paths:
      - ".github/workflows/esphome.yml"
      - "firmware/**"
      - "hardware/*/firmware/**"
      - "homeassistant/**"
      - "tools/check_esphome.py"

permissions:
  contents: read

jobs:
  compile:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      # Pinned to the commit SHA currently pointed at by actions/checkout@v4.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      # Pinned to the commit SHA currently pointed at by actions/setup-python@v5.
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: firmware/requirements.txt
      - name: Install pinned ESPHome
        run: python -m pip install -r firmware/requirements.txt
      - name: Validate and compile every ESPHome target
        # --ci substitutes non-secret synthetic credentials into the device
        # entry points so they can be compiled without weakening the production
        # fail-closed gate (the committed files keep their placeholders).
        run: python tools/check_esphome.py --compile --ci

  native-esp-idf:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      # Pinned to the commit SHA currently pointed at by actions/checkout@v4.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      # Pinned to the commit SHA currently pointed at by actions/setup-python@v5.
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      # Pinned to the commit SHA currently pointed at by actions/cache@v4.
      - name: Cache PlatformIO packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ~/.platformio
          key: platformio-${{ runner.os }}-${{ hashFiles('firmware/esp-idf/platformio.ini', 'firmware/esp-idf/sdkconfig.defaults') }}
          restore-keys: |
            platformio-${{ runner.os }}-
      - name: Install PlatformIO
        run: python -m pip install platformio==6.1.19
      - name: Compile native ESP-IDF target
        run: platformio run --project-dir firmware/esp-idf
