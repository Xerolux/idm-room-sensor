set_external_climate:
  name: Set external climate
  description: Write external room temperature and GLT humidity using known registers.
  fields:
    heating_circuit:
      required: true
      selector:
        select:
          options: [A, B, C, D, E, F, G]
    room_temperature:
      required: true
      selector:
        number:
          min: -20
          max: 60
          step: 0.1
    humidity:
      required: true
      selector:
        number:
          min: 0
          max: 100
          step: 0.1
